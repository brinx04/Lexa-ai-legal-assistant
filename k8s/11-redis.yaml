apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: lexa
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - "redis-server"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--save"
            - "60"
            - "1"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: lexa-secrets, key: REDIS_PASSWORD }
          ports:
            - containerPort: 6379
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lexa
spec:
  selector: { app: redis }
  ports:
    - port: 6379
