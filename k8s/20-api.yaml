# Shared scratch space for uploaded files: the api writes, the worker reads,
# and the file is shredded after processing.
# NOTE: ReadWriteMany needs a RWX-capable storage class (EFS, NFS, Azure
# Files). On single-node dev clusters (kind/minikube) the default RWO class
# works because both pods land on the same node. In production, replace this
# with object storage (S3/GCS) and pass a URL instead of a file path.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lexa-uploads
  namespace: lexa
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests: { storage: 2Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: lexa
  labels: { app: api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: api
          image: lexa/backend:latest # build: docker build -t lexa/backend ./backend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: lexa-config }
            - secretRef: { name: lexa-secrets }
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { cpu: "1", memory: 1Gi }
      volumes:
        - name: uploads
          persistentVolumeClaim: { claimName: lexa-uploads }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: lexa
spec:
  selector: { app: api }
  ports:
    - port: 8000
