apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: lexa
  labels: { app: worker }
spec:
  replicas: 2
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      # Give in-flight documents time to finish before SIGKILL on rollout
      terminationGracePeriodSeconds: 120
      containers:
        - name: worker
          image: lexa/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef: { name: lexa-config }
            - secretRef: { name: lexa-secrets }
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "celery -A celery_app inspect ping -d celery@$HOSTNAME | grep -q pong"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 15
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits: { cpu: "2", memory: 2Gi }
      volumes:
        - name: uploads
          persistentVolumeClaim: { claimName: lexa-uploads }
