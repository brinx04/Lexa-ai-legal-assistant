# Single public entrypoint. Everything else stays cluster-internal —
# browsers only ever talk to the Next.js frontend, which proxies to the
# API and notifier with server-side credential injection.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lexa
  namespace: lexa
  annotations:
    # SSE: disable response buffering and allow long-lived connections
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    # cert-manager.io/cluster-issuer: letsencrypt-prod   # ← enable with TLS
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts: [lexa.example.com]
  #     secretName: lexa-tls
  rules:
    - host: lexa.example.com # ← your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port: { number: 3000 }
