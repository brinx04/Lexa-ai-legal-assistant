# Dev-cluster Postgres. In production, swap for a managed database
# (RDS / Cloud SQL) and delete this file — stateful data and Kubernetes
# pods are best decoupled.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: lexa
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef: { name: lexa-config }
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: lexa-secrets, key: POSTGRES_PASSWORD }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "lexa_admin", "-d", "lexa_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 5Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: lexa
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
