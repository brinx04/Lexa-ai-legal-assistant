# ══════════════════════════════════════════════════════════════════════════════
# LEXA — distributed stack
#
#   docker compose up -d                 → infra + event bus + observability
#                                          (run FastAPI / Celery / Next.js on
#                                           the host for fast iteration)
#   docker compose --profile full up -d  → everything containerized, end to end
#
# Ports (all bound to 127.0.0.1):
#   5433 Postgres · 6380 Redis · 6335/6336 Qdrant · 9094 Kafka (host listener)
#   8090 notifier (SSE) · 9090 Prometheus · 3001 Grafana · 16686 Jaeger UI
#   4318 OTLP ingest · [full profile] 3000 frontend · 8000 API
# ══════════════════════════════════════════════════════════════════════════════

services:
  # 1. Relational Database: document metadata, user auth sessions, chat history
  postgres:
    image: postgres:15-alpine
    container_name: lexa-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lexa_db}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - lexa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexa_admin} -d ${POSTGRES_DB:-lexa_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Task Broker: Celery job queue (OCR, chunking, agent pipeline execution)
  redis:
    image: redis:7-alpine
    container_name: lexa-redis
    restart: always
    environment:
      # Needed by the healthcheck below — the command-line --requirepass
      # interpolation alone doesn't put the var inside the container.
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - lexa_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Vector Database: semantic embeddings of legal clauses for RAG
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: lexa-qdrant
    restart: always
    ports:
      - "127.0.0.1:6335:6333" # REST API
      - "127.0.0.1:6336:6334" # gRPC
    volumes:
      - lexa_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # EVENT BACKBONE
  # ────────────────────────────────────────────────────────────────────────────

  # 4. Kafka (KRaft, no ZooKeeper) — document lifecycle event stream.
  #    Two listeners: containers talk to kafka:9092, host processes (your
  #    locally-run FastAPI/Celery) talk to localhost:9094.
  kafka:
    image: apache/kafka:3.9.0
    container_name: lexa-kafka
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "127.0.0.1:9094:9094"
    volumes:
      - lexa_kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # 5. Topic bootstrap — partitioned main topic + dead-letter topic.
  #    3 partitions ⇒ up to 3 notifier replicas share the load.
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: lexa-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic lexa.document.events --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic lexa.document.events.dlq --partitions 1 --replication-factor 1
        echo "Topics ready:" && /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  # 6. Notifier (Go) — consumes Kafka events, pushes real-time SSE to browsers.
  #    Runs in the default profile so host-run dev also gets live updates.
  notifier:
    build: ./notifier
    container_name: lexa-notifier
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: lexa.document.events
      KAFKA_DLQ_TOPIC: lexa.document.events.dlq
      KAFKA_GROUP_ID: lexa-notifier
      PORT: "8090"
    ports:
      - "127.0.0.1:8090:8090"

  # ────────────────────────────────────────────────────────────────────────────
  # OBSERVABILITY
  # ────────────────────────────────────────────────────────────────────────────

  # 7. Jaeger — distributed trace storage + UI (http://localhost:16686)
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: lexa-jaeger
    restart: always
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686" # UI
      - "127.0.0.1:4318:4318"   # OTLP/HTTP ingest

  # 8. Prometheus — scrapes API and notifier metrics
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: lexa-prometheus
    restart: always
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - lexa_prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway" # reach host-run uvicorn on Linux too

  # 9. Grafana — pre-provisioned dashboard (http://localhost:3001, admin/admin)
  grafana:
    image: grafana/grafana:11.2.0
    container_name: lexa-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - lexa_grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus

  # ────────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES — `docker compose --profile full up -d --build`
  # ────────────────────────────────────────────────────────────────────────────

  api:
    build: ./backend
    container_name: lexa-api
    profiles: ["full"]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lexa_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_URL: http://qdrant:6333
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LEXA_SECRET_API_KEY: ${LEXA_SECRET_API_KEY}
      KANOON_API_TOKEN: ${KANOON_API_TOKEN:-}
    volumes:
      - lexa_uploads:/app/uploads # shared with worker — it reads what api saves
    ports:
      - "127.0.0.1:8000:8000"

  worker:
    build: ./backend
    container_name: lexa-worker
    profiles: ["full"]
    restart: always
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lexa_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_URL: http://qdrant:6333
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LEXA_SECRET_API_KEY: ${LEXA_SECRET_API_KEY}
      KANOON_API_TOKEN: ${KANOON_API_TOKEN:-}
    volumes:
      - lexa_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d celery@$$HOSTNAME | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: lexa-frontend
    profiles: ["full"]
    restart: always
    depends_on:
      - api
      - notifier
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXT_PUBLIC_API_URL: http://api:8000/api/v1
      NOTIFIER_URL: http://notifier:8090
      LEXA_SECRET_API_KEY: ${LEXA_SECRET_API_KEY}
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  lexa_postgres_data:
  lexa_redis_data:
  lexa_qdrant_data:
  lexa_kafka_data:
  lexa_prometheus_data:
  lexa_grafana_data:
  lexa_uploads:
