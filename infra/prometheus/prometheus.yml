# Prometheus scrape config for the Lexa stack.
# Both containerized (service-name) and host-run (host.docker.internal)
# targets are listed — whichever mode you run in, the live one reports UP
# and the other simply shows as down.

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "lexa-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels: { mode: "container" }
      - targets: ["host.docker.internal:8000"]
        labels: { mode: "host" }

  - job_name: "lexa-notifier"
    metrics_path: /metrics
    static_configs:
      - targets: ["notifier:8090"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
